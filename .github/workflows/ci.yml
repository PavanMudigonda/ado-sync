name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify CLI starts
        run: node dist/cli.js --version

      - name: Verify package boundary
        shell: bash
        run: |
          PACK_JSON="$(npm pack --dry-run --json)"
          echo "$PACK_JSON"
          PACK_JSON="$PACK_JSON" node <<'EOF'
          const pack = JSON.parse(process.env.PACK_JSON ?? '[]');
          const files = pack[0]?.files?.map((entry) => entry.path) ?? [];
          const unexpected = files.filter((filePath) => filePath.startsWith('docs-site/'));

          if (unexpected.length > 0) {
            console.error('Unexpected docs-site files in npm package:');
            for (const filePath of unexpected) console.error(filePath);
            process.exit(1);
          }
          EOF

  docs:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build docs site
        working-directory: docs-site
        run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
