name: Publish to npm

on:
  release:
    types: [published]

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (publish with --dry-run flag, nothing actually published)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for npm provenance (--provenance flag)

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Stamp the exact release tag version into package.json before publishing.
      # This ensures npm always publishes the version that matches the GitHub release,
      # regardless of what was previously committed in package.json.
      # Tag format: v1.2.3  →  npm version: 1.2.3
      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "✓ package.json version set to $TAG_VERSION (from tag $GITHUB_REF_NAME)"

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
