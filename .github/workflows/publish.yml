name: Publish to npm

on:
  release:
    types: [published]

  # Trigger automatically when release.yml pushes a version tag to main
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (publish with --dry-run flag, nothing actually published)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for npm provenance (--provenance flag)

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Stamp the exact release tag version into package.json before publishing.
      # This ensures npm always publishes the version that matches the GitHub release,
      # regardless of what was previously committed in package.json.
      # Tag format: v1.2.3  →  npm version: 1.2.3
      - name: Set version from release tag
        if: github.event_name == 'release' || github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "✓ package.json version set to $TAG_VERSION (from tag $GITHUB_REF_NAME)"

      - name: Check npm version availability
        id: npm_version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Skipping publish because $PACKAGE_NAME@$PACKAGE_VERSION already exists on npm."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is available to publish."
          fi

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: (github.event_name == 'release' || github.event_name == 'push' || github.event.inputs.dry_run == 'false') && steps.npm_version_check.outputs.already_published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish for existing version
        if: (github.event_name == 'release' || github.event_name == 'push' || github.event.inputs.dry_run == 'false') && steps.npm_version_check.outputs.already_published == 'true'
        run: echo "Publish skipped because ${{ steps.npm_version_check.outputs.package_name }}@${{ steps.npm_version_check.outputs.package_version }} is already published."
