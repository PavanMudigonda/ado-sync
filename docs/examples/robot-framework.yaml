orgUrl: https://dev.azure.com/your-org
project: YourProject
auth:
  type: pat
  token: $AZURE_DEVOPS_TOKEN
testPlan:
  id: 12345            # replace with your test plan ID
  suiteId: 12346       # replace with your root suite ID
  suiteMapping: flat
local:
  type: robot
  include: tests/**/*.robot
  exclude:
    - tests/resources/**
    - tests/keywords/**
sync:
  tagPrefix: tc
  titleField: System.Title
  markAutomated: true
